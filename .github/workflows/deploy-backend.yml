name: Deploy backend
on:
  push:
    branches: [main]
    paths: ['backend/**']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Install lightsailctl
        run: |
          sudo curl -sSL https://s3.us-west-2.amazonaws.com/lightsailctl/latest/linux-amd64/lightsailctl -o /usr/local/bin/lightsailctl
          sudo chmod +x /usr/local/bin/lightsailctl
      - run: docker build -t srsyduts-backend backend
      - run: aws lightsail push-container-image --region us-east-1 --service-name srsyduts-backend --label app --image srsyduts-backend:latest